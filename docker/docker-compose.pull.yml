services:
  cuktech-ble:
    # 或者使用 docker-hub : kairui1108/cuktech-ble-server
    image: ghcr.io/kairui1108/cuktech-ble-server:latest
    container_name: cuktech-ble
    network_mode: host
    privileged: true
    volumes:
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
      - ./cuktech-data:/data
    environment:
      - CUKTECH_SERVER_PORT=8199
      - CUKTECH_HISTORY_DB_PATH=/data/port_history.db
      - TZ=Asia/Shanghai

      # 设备信息（必填）
      - CUKTECH_DEVICE_MAC=XX:XX:XX:XX:XX:XX
      - CUKTECH_DEVICE_TOKEN=
      - CUKTECH_DEVICE_BLE_KEY=

      # MQTT 配置（选填，不需要 HA 则设为 false）
      - MQTT_ENABLED=false
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=
      - MQTT_PASS=
      - MQTT_TOPIC_PREFIX=cuktech/charger

      # 巴法云配置（选填，接入小爱同学/小度音箱）
      - BEMFA_ENABLED=false
      - BEMFA_UID=
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
