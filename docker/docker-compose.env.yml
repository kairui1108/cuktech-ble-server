services:
  cuktech-ble:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cuktech-ble
    network_mode: host
    privileged: true
    volumes:
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
      - cuktech-data:/data
    environment:
      - CUKTECH_HISTORY_DB_PATH=/data/port_history.db
      - TZ=Asia/Shanghai
      - CUKTECH_SERVER_PORT=8199
      - CUKTECH_DEVICE_MAC=XX:XX:XX:XX:XX:XX
      - CUKTECH_DEVICE_TOKEN=
      - CUKTECH_DEVICE_BLE_KEY=
      - MQTT_ENABLED=false
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=
      - MQTT_PASS=
      - MQTT_TOPIC_PREFIX=cuktech/charger
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cuktech-data:
