<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%;
            overflow: hidden;
        }
        :root {
            --bg: #1c1c1c; --card-bg: #252525; --card-border: #3b3b3b;
            --text: #e1e1e1; --text-dim: #959595;
            --accent: #03a9f4; --accent-rgb: 3, 169, 244;
            --success: #389e3d; --success-rgb: 56, 158, 61;
            --warning: #ffa42b; --warning-rgb: 255, 164, 43;
            --danger: #db4437; --danger-rgb: 219, 68, 55;
            --border-radius: 8px;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .charger-layout {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 20px;
            align-items: end;
            width: 100%;
        }
        .charger-image { display: flex; align-items: center; justify-content: center; min-width: 0; position: relative; }
        /* ── Device Container ── */
        .device-wrap { width: 160px; max-width: 100%; margin: 0 auto; position: relative; }
        .device-wrap-inner { position: relative; width: 100%; overflow: hidden; }
        .unconnected-img { width: 100%; display: none; margin: 0 auto; object-fit: contain; }
        .unconnected-img.show { display: block; }
        .device-charger { position: relative; width: 160px; margin: 0 auto; display: none; }
        .device-charger.show { display: block; }
        .device-charger.charging { animation: deviceFloat 3s ease-in-out infinite; }
        @keyframes deviceFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        .device-img { width: 100%; display: block; }
        .dark-glow-ani {
            position: absolute; width: 80%; height: 60%; left: 10%; top: 5%;
            border-radius: 50%; opacity: 0; transition: opacity 0.8s ease;
            pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse, rgba(70,180,255,0.18) 0%, rgba(70,180,255,0.04) 50%, transparent 70%);
        }
        .dark-glow-ani.active { opacity: 1; }
        .usb-overlay-ani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .usb-mod-ani { position: absolute; left: 0; right: 0; height: 14%; display: none; }
        .usb-mod-ani.active { display: block; }
        .usb-picon { position: absolute; width: 10%; height: 12px; left: 70%; z-index: 4; }
        .usb-picon img { width: 100%; height: 100%; object-fit: contain; }
        .usb-pbg { position: absolute; left: 43%; z-index: 3; }
        .usb-pbg img { height: 100%; object-fit: contain; }
        .usb-pval { position: absolute; z-index: 4; color: #64B5F6; font-size: 8px; font-weight: bold; text-align: center; left: 80%; width: 20%; }
        .charger-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            min-width: 0;
            overflow: hidden;
        }
        .control-box { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 10px; 
            padding: 12px; 
            min-width: 0; 
            overflow: hidden;
        }
        .control-label { 
            font-size: 11px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 8px; 
        }
        .status-badge { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 500; 
        }
        .status-badge.connected { 
            background: rgba(var(--success-rgb), 0.12); 
            color: var(--success); 
            box-shadow: 0 0 20px rgba(var(--success-rgb), 0.1); 
        }
        .status-badge.disconnected { 
            background: rgba(var(--danger-rgb), 0.12); 
            color: var(--danger); 
        }
        .status-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: currentColor; 
            animation: pulse 2s infinite; 
        }
        .status-badge.disconnected .status-dot { animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .port-count { font-size: 14px; font-weight: 600; color: var(--success); }
        .port-count-label { font-size: 11px; color: var(--text-dim); }
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; 
            padding: 12px 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { 
            background: rgba(var(--accent-rgb), 0.15); 
            color: var(--accent); 
            border: 1px solid rgba(var(--accent-rgb), 0.3); 
        }
        .btn-primary:hover { 
            background: rgba(var(--accent-rgb), 0.25); 
            box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.2); 
        }
        .btn-danger { 
            background: rgba(var(--danger-rgb), 0.15); 
            color: var(--danger); 
            border: 1px solid rgba(var(--danger-rgb), 0.3); 
        }
        .btn-danger:hover { 
            background: rgba(var(--danger-rgb), 0.25); 
            box-shadow: 0 2px 12px rgba(var(--danger-rgb), 0.2); 
        }
        .btn-secondary { 
            background: rgba(255, 255, 255, 0.06); 
            color: var(--text); 
            border: 1px solid var(--card-border); 
        }
        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: var(--accent); 
        }
        .stat-box { 
            text-align: center; 
            padding: 12px 8px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 10px; 
            min-width: 0; 
        }
        .stat-value { 
            font-size: 22px; 
            font-weight: 700; 
            color: var(--accent); 
            line-height: 1; 
        }
        .stat-value.warning { color: var(--warning); }
        .stat-label { 
            font-size: 10px; 
            color: var(--text-dim); 
            margin-top: 4px; 
            text-transform: uppercase; 
        }
        @media (max-width: 600px) {
            .charger-layout { grid-template-columns: 1fr; align-items: start; }
            .charger-image { justify-content: flex-start; transform: translateX(-12px); }
            .device-wrap { max-width: 200px; }
            .device-wrap-inner { height: auto; overflow: visible; }
            .device-charger { width: 200px; height: auto; }
            .charger-controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="charger-layout">
        <div class="charger-image">
            <div class="device-wrap" id="deviceWrap">
                <img class="unconnected-img show" id="unconnectedImg" src="/static/plugin_imgs/main_card_ad1204u_unconnected.png" alt="CUKTECH Charger">
                <div class="device-wrap-inner">
                    <div class="device-charger" id="deviceChargerAnim">
                        <div class="dark-glow-ani" id="darkGlowAni"></div>
                        <img class="device-img" src="/static/plugin_imgs/main_charger_dark_ad1204_all.png" alt="">
                        <div class="usb-overlay-ani" id="usbOverlayAni">
                            <div class="usb-mod-ani" id="usbModC1" style="top:25%"><div class="usb-picon" style="top:1px"><img src="/static/plugin_imgs/main_charger_dark_power_on.png" alt=""></div><div class="usb-pbg" style="top:0;width:57%;height:24px"><img src="/static/plugin_imgs/main_card_usb_c_rectangle.png" alt="" style="width:100%;height:100%"></div><div class="usb-pval" id="usbPvalC1" style="top:7px">0W</div></div>
                            <div class="usb-mod-ani" id="usbModC2" style="top:35%"><div class="usb-picon" style="top:1px"><img src="/static/plugin_imgs/main_charger_dark_power_on.png" alt=""></div><div class="usb-pbg" style="top:0;width:57%;height:24px"><img src="/static/plugin_imgs/main_card_usb_c_rectangle.png" alt="" style="width:100%;height:100%"></div><div class="usb-pval" id="usbPvalC2" style="top:7px">0W</div></div>
                            <div class="usb-mod-ani" id="usbModC3" style="top:45%"><div class="usb-picon" style="top:1px"><img src="/static/plugin_imgs/main_charger_dark_power_on.png" alt=""></div><div class="usb-pbg" style="top:0;width:57%;height:24px"><img src="/static/plugin_imgs/main_card_usb_c_rectangle.png" alt="" style="width:100%;height:100%"></div><div class="usb-pval" id="usbPvalC3" style="top:7px">0W</div></div>
                            <div class="usb-mod-ani" id="usbModA" style="top:55%"><div class="usb-picon" style="top:1px"><img src="/static/plugin_imgs/main_charger_dark_power_on.png" alt=""></div><div class="usb-pbg" style="top:0;left:42%;width:57%;height:24px"><img src="/static/plugin_imgs/main_card_usb_a_rectangle.png" alt="" style="width:100%;height:100%"></div><div class="usb-pval" id="usbPvalA" style="top:7px">0W</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="charger-controls">
            <div class="control-box">
                <div class="control-label" style="display: flex; justify-content: space-between; align-items: baseline;">
                    <span>连接状态</span>
                    <span id="firmwareVersion" style="font-weight: 400; font-size: 10px;"></span>
                </div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <div id="statusBadge" class="status-badge disconnected">
                        <span class="status-dot"></span>
                        <span id="statusText">连接中...</span>
                    </div>
                    <span class="port-count" id="activePorts">0</span>
                    <span class="port-count-label">活跃端口</span>
                </div>
            </div>
            <div class="control-box">
                <div class="control-label">BLE 控制</div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="bleToggle" onclick="bleToggle()">连接设备</button>
                    <button class="btn btn-secondary" onclick="bleRestart()">重启</button>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalPower">0.0</div>
                <div class="stat-label">总功率 (W)</div>
            </div>
            <div class="stat-box">
                <div class="stat-value warning" id="maxVoltage">0.0</div>
                <div class="stat-label">最高电压 (V)</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const PORT_KEY_TO_ID = { c1: 1, c2: 2, c3: 3, a: 4 };
        let bleConnected = false;

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                
                bleConnected = data.connected && data.authenticated;
                
                const badge = document.getElementById('statusBadge');
                const text = document.getElementById('statusText');
                
                if (bleConnected) {
                    badge.className = 'status-badge connected';
                    text.textContent = '已连接';
                } else if (data.connected) {
                    badge.className = 'status-badge connected';
                    text.textContent = '认证中...';
                } else {
                    badge.className = 'status-badge disconnected';
                    text.textContent = '未连接';
                }
                
                const btn = document.getElementById('bleToggle');
                if (bleConnected) {
                    btn.textContent = '断开设备';
                    btn.className = 'btn btn-danger';
                } else {
                    btn.textContent = '连接设备';
                    btn.className = 'btn btn-primary';
                }
                
                let totalPower = 0, activeCount = 0, maxV = 0;
                for (const [id, port] of Object.entries(data.ports || {})) {
                    if ((port.current > 0 || port.power > 0) && port.enabled) {
                        totalPower += port.power;
                        activeCount++;
                        maxV = Math.max(maxV, port.voltage);
                    }
                }
                document.getElementById('totalPower').textContent = totalPower.toFixed(1);
                document.getElementById('activePorts').textContent = activeCount;
                document.getElementById('maxVoltage').textContent = maxV.toFixed(1);
                if (data.firmware_version) {
                    document.getElementById('firmwareVersion').textContent = '固件版本：' + data.firmware_version;
                }
                updateDeviceContainer(data.ports);
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function updateDeviceContainer(ports) {
            const unconnected = document.getElementById('unconnectedImg');
            const charger = document.getElementById('deviceChargerAnim');
            const glow = document.getElementById('darkGlowAni');
            if (!unconnected || !charger) return;
            let totalW = 0;
            for (const [id, port] of Object.entries(ports || {})) {
                if (port.enabled && port.power > 0) totalW += port.power;
            }
            if (totalW > 0) {
                unconnected.classList.remove('show');
                charger.classList.add('show');
                charger.classList.add('charging');
                if (glow) glow.classList.add('active');
                ['c1','c2','c3','a'].forEach(k => {
                    const p = ports[PORT_KEY_TO_ID[k]] || { voltage:0,current:0,power:0,enabled:false };
                    const mod = document.getElementById('usbMod' + k.toUpperCase());
                    const pval = document.getElementById('usbPval' + k.toUpperCase());
                    const active = p.enabled && p.power > 0;
                    if (mod) mod.classList.toggle('active', active);
                    if (pval) pval.textContent = active ? p.power.toFixed(1) + 'W' : '0W';
                });
            } else {
                unconnected.classList.add('show');
                charger.classList.remove('show');
                charger.classList.remove('charging');
                if (glow) glow.classList.remove('active');
                ['c1','c2','c3','a'].forEach(k => {
                    const m = document.getElementById('usbMod' + k.toUpperCase());
                    if (m) m.classList.remove('active');
                });
            }
        }

        async function bleToggle() {
            const btn = document.getElementById('bleToggle');
            if (btn.disabled) return;
            btn.disabled = true;
            try {
                const enable = btn.textContent === '连接设备';
                await fetch(`${API_BASE}/api/enable`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enable })
                });
                await new Promise(r => setTimeout(r, 500));
                await fetchStatus();
            } catch (e) {
                console.error('BLE toggle error:', e);
            } finally {
                btn.disabled = false;
            }
        }

        async function bleRestart() {
            await fetch(`${API_BASE}/api/enable`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: false })
            });
            setTimeout(async () => {
                await fetch(`${API_BASE}/api/enable`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: true })
                });
                setTimeout(fetchStatus, 2000);
            }, 2000);
        }

        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
