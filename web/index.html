<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUKTECH 10 GaN Charger Ultra</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1c1c1c; --card-bg: #252525; --card-border: #3b3b3b;
            --text: #e1e1e1; --text-dim: #959595;
            --accent: #03a9f4; --accent-rgb: 3, 169, 244;
            --success: #389e3d; --success-rgb: 56, 158, 61;
            --warning: #ffa42b; --warning-rgb: 255, 164, 43;
            --danger: #db4437; --danger-rgb: 219, 68, 55;
            --port-c1: #03a9f4; --port-c2: #7c4dff; --port-c3: #389e3d; --port-a: #ffa42b;
            --border-radius: 8px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; padding: 24px 0 16px; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent), #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .status-badge.connected { background: rgba(var(--success-rgb), 0.12); color: var(--success); box-shadow: 0 0 20px rgba(var(--success-rgb), 0.1); }
        .status-badge.disconnected { background: rgba(var(--danger-rgb), 0.12); color: var(--danger); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        .status-badge.disconnected .status-dot { animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--border-radius); padding: 20px; margin-bottom: 14px; }
        .card:hover { border-color: var(--accent); }
        .card-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); border: 1px solid rgba(var(--accent-rgb), 0.3); }
        .btn-primary:hover { background: rgba(var(--accent-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.2); }
        .btn-danger { background: rgba(var(--danger-rgb), 0.15); color: var(--danger); border: 1px solid rgba(var(--danger-rgb), 0.3); }
        .btn-danger:hover { background: rgba(var(--danger-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--danger-rgb), 0.2); }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: var(--text); border: 1px solid var(--card-border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }
        .btn-toggle { position: relative; overflow: hidden; }
        .btn-toggle .btn-on, .btn-toggle .btn-off { transition: opacity 0.2s; }
        .btn-toggle.is-on .btn-on { display: inline; }
        .btn-toggle.is-on .btn-off { display: none; }
        .btn-toggle:not(.is-on) .btn-on { display: none; }
        .btn-toggle:not(.is-on) .btn-off { display: inline; }
        .power-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .power-item { text-align: center; padding: 16px 8px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; }
        .power-value { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
        .power-value.success { color: var(--success); }
        .power-value.warning { color: var(--warning); }
        .power-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .charger-layout { display: grid; grid-template-columns: 180px 1fr; gap: 20px; align-items: start; }
        .charger-image { display: flex; align-items: center; justify-content: center; min-width: 0; }
        .charger-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-width: 0; overflow: hidden; }
        .control-box { background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 12px; min-width: 0; overflow: hidden; }
        .control-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .port-count { font-size: 14px; font-weight: 600; color: var(--success); }
        .port-count-label { font-size: 11px; color: var(--text-dim); }
        .stat-box { text-align: center; padding: 12px 8px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; min-width: 0; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; }
        .chart-container { position: relative; height: 200px; margin-top: 8px; }
        .port-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow: hidden; }
        .port-card { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 16px; border: 1px solid transparent; transition: all 0.3s; cursor: pointer; min-width: 0; overflow: hidden; }
        .port-card:hover { border-color: rgba(var(--accent-rgb), 0.3); }
        .port-card.active { border-color: rgba(var(--accent-rgb), 0.3); background: rgba(var(--accent-rgb), 0.05); }
        .port-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .port-name { font-size: 15px; font-weight: 700; }
        .port-name.c1 { color: var(--port-c1); }
        .port-name.c2 { color: var(--port-c2); }
        .port-name.c3 { color: var(--port-c3); }
        .port-name.a { color: var(--port-a); }
        .port-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .port-stat { text-align: center; }
        .port-stat-value { font-size: 16px; font-weight: 600; }
        .port-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .port-toggle { position: relative; width: 44px; height: 24px; }
        .port-toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .toggle-slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .port-toggle input:checked + .toggle-slider { background: var(--accent); box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.4); }
        .port-toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
        .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow: hidden; }
        .setting-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; min-width: 0; overflow: hidden; }
        .setting-label { font-size: 13px; color: var(--text-dim); }
        .setting-select { padding: 6px 10px; border: 1px solid var(--card-border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 12px; min-width: 100px; max-width: 120px; cursor: pointer; }
        .setting-select:focus { outline: none; border-color: var(--accent); }
        .footer { text-align: center; padding: 20px 0; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; justify-content: center; }
        .theme-switcher { position: relative; display: inline-block; }
        .theme-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--card-border); border-radius: 6px; padding: 4px 10px; color: var(--text-dim); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }
        .theme-menu { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px; margin-bottom: 8px; min-width: 140px; z-index: 10; }
        .theme-menu.show { display: block; }
        .theme-option { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text); transition: background 0.2s; }
        .theme-option:hover { background: rgba(255, 255, 255, 0.08); }
        .theme-option.active { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); }
        .theme-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--border-radius); padding: 24px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border: none; border-radius: 50%; background: rgba(255, 255, 255, 0.1); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: rgba(255, 255, 255, 0.2); }
        .modal-chart-container { position: relative; height: 250px; margin-bottom: 20px; }
        .modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; overflow: hidden; }
        .countdown-item { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 16px; min-width: 0; overflow: hidden; }
        .countdown-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .countdown-port { font-size: 14px; font-weight: 600; }
        .countdown-port.c1 { color: var(--port-c1); }
        .countdown-port.c2 { color: var(--port-c2); }
        .countdown-port.c3 { color: var(--port-c3); }
        .countdown-port.a { color: var(--port-a); }
        .countdown-current { font-size: 12px; color: var(--text-dim); }
        .countdown-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .countdown-input { flex: 1; padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; text-align: center; min-width: 60px; max-width: 100px; }
        .countdown-input:focus { outline: none; border-color: var(--accent); }
        .countdown-unit { padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 8px; background: rgba(255, 255, 255, 0.03); color: var(--text-dim); font-size: 12px; display: flex; align-items: center; }
        .countdown-quick { display: flex; gap: 6px; flex-wrap: wrap; }
        .countdown-quick-btn { padding: 6px 10px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; background: rgba(255, 255, 255, 0.08); color: var(--text); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .countdown-quick-btn:hover { background: rgba(var(--accent-rgb), 0.2); border-color: var(--accent); color: var(--accent); }
        .countdown-actions { display: flex; gap: 8px; margin-top: 10px; }
        .countdown-set-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: rgba(var(--accent-rgb), 0.15); color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(var(--accent-rgb), 0.2); }
        .countdown-set-btn:hover { background: rgba(var(--accent-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.2); }
        .countdown-clear-btn { padding: 8px 12px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; background: rgba(255, 255, 255, 0.06); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .countdown-clear-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(var(--danger-rgb), 0.1); }
        @media (max-width: 600px) {
            .charger-layout { grid-template-columns: 1fr; }
            .charger-image { max-height: 150px; }
            .charger-controls { grid-template-columns: 1fr; }
            .port-grid, .settings-grid, .countdown-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://cuktech.com.cn/kuke/template/statics/kuke/images/logo_footer.png" alt="CUKTECH" style="height: 40px; margin-bottom: 12px; filter: brightness(1.2);">
        </div>

        <div class="card">
            <div class="charger-layout">
                <div class="charger-image">
                    <img id="chargerImage" src="" alt="CUKTECH Charger" style="max-width: 100%; max-height: 200px; object-fit: contain;">
                </div>
                <div class="charger-controls">
                    <div class="control-box">
                        <div class="control-label">连接状态</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <div id="statusBadge" class="status-badge disconnected">
                                <span class="status-dot"></span>
                                <span id="statusText">连接中...</span>
                            </div>
                            <span class="port-count" id="activePorts">0</span>
                            <span class="port-count-label">活跃端口</span>
                        </div>
                    </div>
                    <div class="control-box">
                        <div class="control-label">BLE 控制</div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="bleToggle" onclick="bleToggle()">连接设备</button>
                            <button class="btn btn-secondary" onclick="bleRestart()">重启</button>
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalPower">0.0</div>
                        <div class="stat-label">总功率 (W)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value warning" id="maxVoltage">0.0</div>
                        <div class="stat-label">最高电压 (V)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">功率曲线</div>
            <div class="chart-container"><canvas id="powerChart"></canvas></div>
        </div>

        <div class="card">
            <div class="card-title">端口监控 <span style="font-size:10px;color:var(--text-dim);text-transform:none;letter-spacing:0">(点击查看详情)</span></div>
            <div class="port-grid" id="portGrid"></div>
        </div>

        <div class="card">
            <div class="card-title">设备设置</div>
            <div class="settings-grid" id="settingsGrid"></div>
        </div>

        <div class="card">
            <div class="card-title">倒计时设置</div>
            <div class="countdown-grid" id="countdownGrid"></div>
        </div>

        <div class="footer">
            <a href="https://github.com/kairui1108/cuktech-ble-ha" target="_blank" style="color: var(--accent); text-decoration: none;">CUKTECH-BLE-HA Web</a>
            <span style="margin: 0 12px; color: var(--text-dim);">|</span>
            <div class="theme-switcher" id="themeSwitcher">
                <button class="theme-btn" onclick="toggleThemeMenu()" id="themeBtn">🎨 主题</button>
                <div class="theme-menu" id="themeMenu">
                    <div class="theme-option" onclick="setTheme('ha-dark')" data-theme="ha-dark">
                        <span class="theme-dot" style="background: #1c1c1c;"></span> 暗色
                    </div>
                    <div class="theme-option" onclick="setTheme('deep-blue')" data-theme="deep-blue">
                        <span class="theme-dot" style="background: #0f0f1a;"></span> 深蓝
                    </div>
                    <div class="theme-option" onclick="setTheme('ocean')" data-theme="ocean">
                        <span class="theme-dot" style="background: #0a1628;"></span> 海洋
                    </div>
                    <div class="theme-option" onclick="setTheme('gray')" data-theme="gray">
                        <span class="theme-dot" style="background: #2d2d2d;"></span> 灰色
                    </div>
                    <div class="theme-option" onclick="setTheme('light')" data-theme="light">
                        <span class="theme-dot" style="background: #f5f5f5;"></span> 浅色
                    </div>
                    <div class="theme-option" onclick="setTheme('system')" data-theme="system">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #1c1c1c 50%, #f5f5f5 50%);"></span> 跟随系统
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="portModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">C1 端口详情</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-stats">
                <div class="power-item"><div class="power-value" id="modalVoltage">0.0</div><div class="power-label">电压 (V)</div></div>
                <div class="power-item"><div class="power-value success" id="modalCurrent">0.0</div><div class="power-label">电流 (A)</div></div>
                <div class="power-item"><div class="power-value warning" id="modalPower">0.0</div><div class="power-label">功率 (W)</div></div>
                <div class="power-item"><div class="power-value" id="modalProtocol" style="font-size:14px">idle</div><div class="power-label">协议</div></div>
            </div>
            <div class="modal-chart-container"><canvas id="modalChart"></canvas></div>
        </div>
    </div>

    <script>
        // Load charger image as base64
        const chargerImg = document.getElementById('chargerImage');
        fetch('/static/charger.png')
            .then(r => r.blob())
            .then(blob => {
                const reader = new FileReader();
                reader.onloadend = () => { chargerImg.src = reader.result; };
                reader.readAsDataURL(blob);
            })
            .catch(() => { chargerImg.style.display = 'none'; });

        // Theme definitions
        const THEMES = {
            'ha-dark': {
                '--bg': '#1c1c1c', '--card-bg': '#252525', '--card-border': '#3b3b3b',
                '--text': '#e1e1e1', '--text-dim': '#959595',
                '--accent': '#03a9f4', '--accent-rgb': '3, 169, 244',
                '--success': '#389e3d', '--success-rgb': '56, 158, 61',
                '--warning': '#ffa42b', '--warning-rgb': '255, 164, 43',
                '--danger': '#db4437', '--danger-rgb': '219, 68, 55'
            },
            'deep-blue': {
                '--bg': '#0f0f1a', '--card-bg': '#1a1a2e', '--card-border': '#2a2a4a',
                '--text': '#e8e8f0', '--text-dim': '#8888aa',
                '--accent': '#00d4ff', '--accent-rgb': '0, 212, 255',
                '--success': '#00e676', '--success-rgb': '0, 230, 118',
                '--warning': '#ffc107', '--warning-rgb': '255, 193, 7',
                '--danger': '#ff5252', '--danger-rgb': '255, 82, 82'
            },
            'ocean': {
                '--bg': '#0a1628', '--card-bg': '#0f2035', '--card-border': '#1a3a5c',
                '--text': '#e0f0ff', '--text-dim': '#7aa3cc',
                '--accent': '#00b4d8', '--accent-rgb': '0, 180, 216',
                '--success': '#48bb78', '--success-rgb': '72, 187, 120',
                '--warning': '#f6ad55', '--warning-rgb': '246, 173, 85',
                '--danger': '#fc8181', '--danger-rgb': '252, 129, 129'
            },
            'gray': {
                '--bg': '#2d2d2d', '--card-bg': '#3a3a3a', '--card-border': '#4a4a4a',
                '--text': '#f0f0f0', '--text-dim': '#aaaaaa',
                '--accent': '#4fc3f7', '--accent-rgb': '79, 195, 247',
                '--success': '#81c784', '--success-rgb': '129, 199, 132',
                '--warning': '#ffb74d', '--warning-rgb': '255, 183, 77',
                '--danger': '#e57373', '--danger-rgb': '229, 115, 115'
            },
            'light': {
                '--bg': '#f5f5f5', '--card-bg': '#ffffff', '--card-border': '#e0e0e0',
                '--text': '#212121', '--text-dim': '#757575',
                '--accent': '#1976d2', '--accent-rgb': '25, 118, 210',
                '--success': '#388e3c', '--success-rgb': '56, 142, 60',
                '--warning': '#f57c00', '--warning-rgb': '245, 124, 0',
                '--danger': '#d32f2f', '--danger-rgb': '211, 47, 47'
            }
        };

        function setTheme(themeName) {
            if (themeName === 'system') {
                localStorage.setItem('cuktech-theme', 'system');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'ha-dark' : 'light');
            } else {
                localStorage.setItem('cuktech-theme', themeName);
                localStorage.removeItem('cuktech-theme-original');
                applyTheme(themeName);
            }
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === themeName);
            });
            document.getElementById('themeMenu').classList.remove('show');
        }

        function applyTheme(themeName) {
            const theme = THEMES[themeName];
            if (!theme) return;
            const root = document.documentElement;
            Object.entries(theme).forEach(([key, value]) => {
                root.style.setProperty(key, value);
            });
        }

        function toggleThemeMenu() {
            document.getElementById('themeMenu').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.theme-switcher')) {
                document.getElementById('themeMenu').classList.remove('show');
            }
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('cuktech-theme') || 'ha-dark';
        setTheme(savedTheme);

        const API_BASE = window.location.origin;
        const PORT_MAP = { 1: 'C1', 2: 'C2', 3: 'C3', 4: 'A' };
        const PORT_KEY_MAP = { 1: 'c1', 2: 'c2', 3: 'c3', 4: 'a' };

        const SETTINGS_CONFIG = [
            { piid: 5, name: '场景模式', options: [{ value: 1, label: 'AI模式' }, { value: 2, label: '数码生态' }, { value: 3, label: '单口模式' }, { value: 4, label: '均衡模式' }] },
            { piid: 6, name: '息屏时间', options: [{ value: 0, label: '5分钟' }, { value: 1, label: '1分钟' }, { value: 2, label: '10分钟' }, { value: 3, label: '30分钟' }, { value: 4, label: '常亮' }, { value: 5, label: '1分钟' }] },
            { piid: 13, name: '语言', options: [{ value: 0, label: 'English' }, { value: 1, label: '中文' }] },
            { piid: 15, name: 'USB-A常通电', options: [{ value: 0, label: '关闭' }, { value: 1, label: '开启' }] },
            { piid: 19, name: '空闲息屏', options: [{ value: 0, label: '关闭' }, { value: 1, label: '开启' }] },
            { piid: 20, name: '屏幕方向锁', options: [{ value: 0, label: '关闭' }, { value: 1, label: '开启' }] }
        ];

        let lastSettings = {};
        let powerChart = null, modalChart = null, currentModalPort = null;
        let bleConnected = false;
        const MAX_POINTS = 60;
        const portHistory = { 1: { voltage: [], current: [], power: [], protocol: [] }, 2: { voltage: [], current: [], power: [], protocol: [] }, 3: { voltage: [], current: [], power: [], protocol: [] }, 4: { voltage: [], current: [], power: [], protocol: [] } };

        const COUNTDOWN_PIIDS = { 1: 9, 2: 10, 3: 11, 4: 12 };
        const PORT_KEY_TO_ID = { 'c1': 1, 'c2': 2, 'c3': 3, 'a': 4 };
        const QUICK_MINUTES = [15, 30, 60, 90, 120, 240];

        function initChart() {
            const ctx = document.getElementById('powerChart').getContext('2d');
            powerChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'C1', data: [], borderColor: '#00d4ff', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                        { label: 'C2', data: [], borderColor: '#7c4dff', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                        { label: 'C3', data: [], borderColor: '#00e676', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                        { label: 'A', data: [], borderColor: '#ffc107', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false },
                        { label: 'Total', data: [], borderColor: '#ffffff', borderWidth: 2.5, tension: 0.3, pointRadius: 0, fill: false, borderDash: [5, 3] },
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: true, position: 'top', labels: { color: '#8888aa', font: { size: 11 }, boxWidth: 12, padding: 12 } } },
                    scales: { x: { display: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#666', maxTicksLimit: 8, font: { size: 10 } } }, y: { display: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#666', font: { size: 10 } }, beginAtZero: true } }
                }
            });
        }

        function updateChart(ports) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
            powerChart.data.labels.push(timeStr);
            if (powerChart.data.labels.length > MAX_POINTS) powerChart.data.labels.shift();
            let totalPower = 0;
            for (let i = 1; i <= 4; i++) {
                const power = ports[i]?.power || 0;
                totalPower += power;
                powerChart.data.datasets[i - 1].data.push(power);
                if (powerChart.data.datasets[i - 1].data.length > MAX_POINTS) powerChart.data.datasets[i - 1].data.shift();
                portHistory[i].voltage.push(ports[i]?.voltage || 0);
                portHistory[i].current.push(ports[i]?.current || 0);
                portHistory[i].power.push(power);
                portHistory[i].protocol.push(ports[i]?.protocol || 'idle');
                if (portHistory[i].voltage.length > MAX_POINTS) { portHistory[i].voltage.shift(); portHistory[i].current.shift(); portHistory[i].power.shift(); portHistory[i].protocol.shift(); }
            }
            powerChart.data.datasets[4].data.push(totalPower);
            if (powerChart.data.datasets[4].data.length > MAX_POINTS) powerChart.data.datasets[4].data.shift();
            powerChart.update('none');
        }

        function initModalChart() {
            if (modalChart) modalChart.destroy();
            const ctx = document.getElementById('modalChart').getContext('2d');
            modalChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [
                    { label: '电压 (V)', data: [], borderColor: '#00d4ff', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false, yAxisID: 'y' },
                    { label: '电流 (A)', data: [], borderColor: '#00e676', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false, yAxisID: 'y' },
                    { label: '功率 (W)', data: [], borderColor: '#ffc107', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false, yAxisID: 'y1' },
                ]},
                options: { responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: true, position: 'top', labels: { color: '#8888aa', font: { size: 11 }, boxWidth: 12, padding: 12 } } },
                    scales: { x: { display: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#666', maxTicksLimit: 8, font: { size: 10 } } },
                        y: { type: 'linear', display: true, position: 'left', grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#00d4ff', font: { size: 10 } }, beginAtZero: true, title: { display: true, text: 'V / A', color: '#8888aa' } },
                        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#ffc107', font: { size: 10 } }, beginAtZero: true, title: { display: true, text: 'W', color: '#8888aa' } }
                    }
                }
            });
        }

        function openModal(portId) {
            currentModalPort = portId;
            document.getElementById('modalTitle').textContent = `${PORT_MAP[portId]} 端口详情`;
            document.getElementById('modalTitle').style.color = `var(--port-${PORT_KEY_MAP[portId]})`;
            initModalChart();
            updateModalChart();
            document.getElementById('portModal').classList.add('show');
        }

        function closeModal() { document.getElementById('portModal').classList.remove('show'); currentModalPort = null; }

        function updateModalChart() {
            if (!currentModalPort || !modalChart) return;
            const h = portHistory[currentModalPort];
            modalChart.data.labels = [...powerChart.data.labels.slice(-h.voltage.length)];
            modalChart.data.datasets[0].data = [...h.voltage];
            modalChart.data.datasets[1].data = [...h.current];
            modalChart.data.datasets[2].data = [...h.power];
            modalChart.update('none');
            document.getElementById('modalVoltage').textContent = (h.voltage[h.voltage.length - 1] || 0).toFixed(1);
            document.getElementById('modalCurrent').textContent = (h.current[h.current.length - 1] || 0).toFixed(1);
            document.getElementById('modalPower').textContent = (h.power[h.power.length - 1] || 0).toFixed(1);
            const protocolEl = document.getElementById('modalProtocol');
            if (protocolEl) {
                const lastProtocol = h.protocol ? h.protocol[h.protocol.length - 1] : 'idle';
                protocolEl.textContent = lastProtocol;
                protocolEl.style.color = lastProtocol !== 'idle' ? 'var(--accent)' : 'var(--text-dim)';
            }
        }

        document.getElementById('portModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                updateUI(data);
            } catch (e) { console.error('Fetch error:', e); }
        }

        function updateUI(data) {
            bleConnected = data.connected && data.authenticated;
            updateStatusBadge(data.connected, data.authenticated);
            updateBleButton();
            renderPorts(data.ports);
            updateSettingsUI(data.settings || {});
            renderCountdown(data.settings || {});
            let totalPower = 0, activeCount = 0, maxV = 0;
            for (const [id, port] of Object.entries(data.ports)) {
                if ((port.current > 0 || port.power > 0) && port.enabled) {
                    totalPower += port.power;
                    activeCount++;
                    maxV = Math.max(maxV, port.voltage);
                }
            }
            document.getElementById('totalPower').textContent = totalPower.toFixed(1);
            document.getElementById('activePorts').textContent = activeCount;
            document.getElementById('maxVoltage').textContent = maxV.toFixed(1);
            updateChart(data.ports);
            if (currentModalPort) updateModalChart();
        }

        function updateStatusBadge(connected, authenticated) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (connected && authenticated) { badge.className = 'status-badge connected'; text.textContent = '已连接'; }
            else if (connected) { badge.className = 'status-badge connected'; text.textContent = '认证中...'; }
            else { badge.className = 'status-badge disconnected'; text.textContent = '未连接'; }
        }

        function updateBleButton() {
            const btn = document.getElementById('bleToggle');
            if (bleConnected) {
                btn.textContent = '断开设备';
                btn.className = 'btn btn-danger';
            } else {
                btn.textContent = '连接设备';
                btn.className = 'btn btn-primary';
            }
        }

        function renderPorts(ports) {
            const grid = document.getElementById('portGrid');
            let html = '';
            for (const [id, name] of Object.entries(PORT_MAP)) {
                const port = ports[id] || { voltage: 0, current: 0, power: 0, enabled: false, protocol: 'idle' };
                const key = PORT_KEY_MAP[id];
                const protocolColor = port.protocol !== 'idle' ? 'var(--accent)' : 'var(--text-dim)';
                html += `
                    <div class="port-card ${port.enabled ? 'active' : ''}" id="port-${id}" onclick="handlePortClick(event, ${id})">
                        <div class="port-header">
                            <span class="port-name ${key}">${name}</span>
                            <label class="port-toggle" onclick="event.stopPropagation()">
                                <input type="checkbox" id="toggle-${key}" ${port.enabled ? 'checked' : ''} onchange="togglePort('${key}', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="port-stats">
                            <div class="port-stat"><div class="port-stat-value">${port.voltage.toFixed(1)}</div><div class="port-stat-label">电压 V</div></div>
                            <div class="port-stat"><div class="port-stat-value">${port.current.toFixed(1)}</div><div class="port-stat-label">电流 A</div></div>
                            <div class="port-stat"><div class="port-stat-value">${port.power.toFixed(1)}</div><div class="port-stat-label">功率 W</div></div>
                        </div>
                        <div style="text-align:center;margin-top:8px;font-size:11px;color:${protocolColor}">${port.protocol}</div>
                    </div>`;
            }
            grid.innerHTML = html;
        }

        function handlePortClick(event, portId) {
            if (event.target.closest('.port-toggle')) return;
            openModal(portId);
        }

        function updateSettingsUI(settings) {
            const grid = document.getElementById('settingsGrid');
            if (Object.keys(lastSettings).length === 0) {
                let html = '';
                SETTINGS_CONFIG.forEach(s => {
                    const val = settings[String(s.piid)] ?? s.options[0].value;
                    html += `<div class="setting-item"><span class="setting-label">${s.name}</span><select class="setting-select" onchange="setSetting(${s.piid}, parseInt(this.value))">${s.options.map(o => `<option value="${o.value}" ${o.value === val ? 'selected' : ''}>${o.label}</option>`).join('')}</select></div>`;
                });
                grid.innerHTML = html;
            } else {
                SETTINGS_CONFIG.forEach(s => {
                    const select = grid.querySelector(`select[onchange*="${s.piid}"]`);
                    if (select) { const newVal = settings[String(s.piid)] ?? s.options[0].value; if (select.value != newVal) select.value = newVal; }
                });
            }
            lastSettings = settings;
        }

        async function togglePort(port, on) {
            const toggle = document.getElementById(`toggle-${port}`);
            if (toggle) toggle.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/port`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ port, action: on ? 'on' : 'off' }) });
                const result = await res.json();
                if (!result.ok) {
                    if (toggle) toggle.checked = !on;
                }
            } catch (e) {
                console.error('Port toggle error:', e);
                if (toggle) toggle.checked = !on;
            } finally {
                if (toggle) toggle.disabled = false;
                fetchStatus();
            }
        }

        async function setSetting(piid, value) {
            try { await fetch(`${API_BASE}/api/set`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ piid, value }) }); } catch (e) { console.error('Set setting error:', e); }
        }

        let countdownRendered = false;

        function renderCountdown(settings) {
            const grid = document.getElementById('countdownGrid');
            if (!countdownRendered) {
                let html = '';
                for (const [id, name] of Object.entries(PORT_MAP)) {
                    const key = PORT_KEY_MAP[id];
                    html += `
                        <div class="countdown-item">
                            <div class="countdown-header">
                                <span class="countdown-port ${key}">${name}</span>
                                <span class="countdown-current" id="countdown-status-${key}">未设置</span>
                            </div>
                            <div class="countdown-input-group">
                                <input type="number" class="countdown-input" id="countdown-${key}" min="0" max="1440" placeholder="分钟">
                                <span class="countdown-unit">分钟</span>
                            </div>
                            <div class="countdown-quick">
                                ${QUICK_MINUTES.map(m => `<button class="countdown-quick-btn" onclick="setCountdown('${key}', ${m})">${m}分</button>`).join('')}
                            </div>
                            <div class="countdown-actions">
                                <button class="countdown-set-btn" onclick="setCountdownFromInput('${key}')">设置</button>
                                <button class="countdown-clear-btn" onclick="setCountdown('${key}', 0)">清除</button>
                            </div>
                        </div>`;
                }
                grid.innerHTML = html;
                countdownRendered = true;
            }
            for (const [id, name] of Object.entries(PORT_MAP)) {
                const piid = COUNTDOWN_PIIDS[id];
                const currentVal = settings[String(piid)] || 0;
                const key = PORT_KEY_MAP[id];
                const statusEl = document.getElementById(`countdown-status-${key}`);
                if (statusEl) {
                    statusEl.textContent = currentVal > 0 ? currentVal + '分钟' : '未设置';
                }
            }
        }

        const countdownPending = {};

        async function setCountdown(port, minutes) {
            if (countdownPending[port]) return;
            countdownPending[port] = true;
            const id = PORT_KEY_TO_ID[port];
            const btn = document.querySelector(`#countdownGrid .countdown-item:nth-child(${id}) .countdown-set-btn`);
            const statusEl = document.getElementById(`countdown-status-${port}`);
            if (btn) { btn.disabled = true; btn.textContent = '设置中...'; }
            const expectedText = minutes > 0 ? minutes + '分钟' : '未设置';
            const piid = COUNTDOWN_PIIDS[id];
            if (!piid) { countdownPending[port] = false; if (btn) { btn.disabled = false; btn.textContent = '设置'; } return; }
            try {
                await fetch(`${API_BASE}/api/set`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ piid, value: minutes }) });
                fetchStatus();
                if (statusEl) {
                    const observer = new MutationObserver(() => {
                        if (statusEl.textContent === expectedText) {
                            observer.disconnect();
                            countdownPending[port] = false;
                            if (btn) { btn.disabled = false; btn.textContent = '设置'; }
                        }
                    });
                    observer.observe(statusEl, { childList: true, characterData: true, subtree: true });
                    setTimeout(() => { observer.disconnect(); countdownPending[port] = false; if (btn) { btn.disabled = false; btn.textContent = '设置'; } }, 10000);
                } else {
                    setTimeout(() => { countdownPending[port] = false; if (btn) { btn.disabled = false; btn.textContent = '设置'; } }, 3000);
                }
            } catch (e) { console.error('Set countdown error:', e); countdownPending[port] = false; if (btn) { btn.disabled = false; btn.textContent = '设置'; } }
        }

        function setCountdownFromInput(port) {
            const input = document.getElementById(`countdown-${port}`);
            const minutes = parseInt(input.value) || 0;
            setCountdown(port, minutes);
        }

        async function bleToggle() {
            const btn = document.getElementById('bleToggle');
            btn.disabled = true;
            try {
                await fetch(`${API_BASE}/api/enable`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: !bleConnected }) });
                setTimeout(fetchStatus, 1000);
            } catch (e) { console.error('BLE toggle error:', e); }
            finally { btn.disabled = false; }
        }

        async function bleRestart() {
            await fetch(`${API_BASE}/api/enable`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: false }) });
            setTimeout(async () => {
                await fetch(`${API_BASE}/api/enable`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: true }) });
                setTimeout(fetchStatus, 2000);
            }, 2000);
        }

        initChart();
        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
