<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUKTECH 10 GaN Charger Ultra</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preload" href="/static/chart.umd.min.js" as="script">
    <link rel="preload" href="/static/charger.png" as="image">
    <script src="/static/chart.umd.min.js"></script>
    <script src="/static/chart-loader.js"></script>
    <script src="/static/chart-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1c1c1c; --card-bg: #252525; --card-border: #3b3b3b;
            --text: #e1e1e1; --text-dim: #959595;
            --accent: #03a9f4; --accent-rgb: 3, 169, 244;
            --success: #389e3d; --success-rgb: 56, 158, 61;
            --warning: #ffa42b; --warning-rgb: 255, 164, 43;
            --danger: #db4437; --danger-rgb: 219, 68, 55;
            --port-c1: #03a9f4; --port-c2: #7c4dff; --port-c3: #389e3d; --port-a: #ffa42b;
            --border-radius: 8px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; padding: 24px 0 16px; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent), #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .status-badge.connected { background: rgba(var(--success-rgb), 0.12); color: var(--success); box-shadow: 0 0 20px rgba(var(--success-rgb), 0.1); }
        .status-badge.disconnected { background: rgba(var(--danger-rgb), 0.12); color: var(--danger); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        .status-badge.disconnected .status-dot { animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--border-radius); padding: 20px; margin-bottom: 14px; }
        .card:hover { border-color: var(--accent); }
        .card-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .card-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
        .time-btn { padding: 4px 8px; border: 1px solid var(--card-border); border-radius: 4px; background: transparent; color: var(--text-dim); font-size: 10px; cursor: pointer; transition: all 0.2s; }
        .time-btn:hover { border-color: var(--accent); color: var(--accent); }
        .time-btn.active { background: rgba(var(--accent-rgb), 0.15); border-color: var(--accent); color: var(--accent); }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); border: 1px solid rgba(var(--accent-rgb), 0.3); }
        .btn-primary:hover { background: rgba(var(--accent-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.2); }
        .btn-danger { background: rgba(var(--danger-rgb), 0.15); color: var(--danger); border: 1px solid rgba(var(--danger-rgb), 0.3); }
        .btn-danger:hover { background: rgba(var(--danger-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--danger-rgb), 0.2); }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: var(--text); border: 1px solid var(--card-border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }
        .btn-toggle { position: relative; overflow: hidden; }
        .btn-toggle .btn-on, .btn-toggle .btn-off { transition: opacity 0.2s; }
        .btn-toggle.is-on .btn-on { display: inline; }
        .btn-toggle.is-on .btn-off { display: none; }
        .btn-toggle:not(.is-on) .btn-on { display: none; }
        .btn-toggle:not(.is-on) .btn-off { display: inline; }
        .power-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .power-item { text-align: center; padding: 16px 8px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; }
        .power-value { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
        .power-value.success { color: var(--success); }
        .power-value.warning { color: var(--warning); }
        .power-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .charger-layout { display: grid; grid-template-columns: 180px 1fr; gap: 20px; align-items: start; }
        .charger-image { display: flex; align-items: center; justify-content: center; min-width: 0; }
        .charger-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-width: 0; overflow: hidden; }
        .control-box { background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 12px; min-width: 0; overflow: hidden; }
        .control-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .port-count { font-size: 14px; font-weight: 600; color: var(--success); }
        .port-count-label { font-size: 11px; color: var(--text-dim); }
        .stat-box { text-align: center; padding: 12px 8px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; min-width: 0; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; }
        .chart-container { position: relative; height: 200px; margin-top: 8px; }
        .port-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow: hidden; }
        .port-card { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 16px; border: 1px solid transparent; transition: all 0.3s; cursor: pointer; min-width: 0; overflow: hidden; }
        .port-card:hover { border-color: rgba(var(--accent-rgb), 0.3); }
        .port-card.active { border-color: rgba(var(--accent-rgb), 0.3); background: rgba(var(--accent-rgb), 0.05); }
        .port-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .port-name { font-size: 15px; font-weight: 700; }
        .port-name.c1 { color: var(--port-c1); }
        .port-name.c2 { color: var(--port-c2); }
        .port-name.c3 { color: var(--port-c3); }
        .port-name.a { color: var(--port-a); }
        .port-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .port-stat { text-align: center; }
        .port-stat-value { font-size: 16px; font-weight: 600; }
        .port-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .port-toggle { position: relative; width: 44px; height: 24px; }
        .port-toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.1); border-radius: 24px; transition: 0.3s; }
        .toggle-slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .port-toggle input:checked + .toggle-slider { background: var(--accent); box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.4); }
        .port-toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
        .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow: hidden; }
        .setting-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; min-width: 0; overflow: hidden; }
        .setting-label { font-size: 13px; color: var(--text-dim); }
        .setting-select { padding: 6px 10px; border: 1px solid var(--card-border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 12px; min-width: 100px; max-width: 120px; cursor: pointer; }
        .setting-select:focus { outline: none; border-color: var(--accent); }
        .footer { text-align: center; padding: 20px 0; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; justify-content: center; }
        .theme-switcher { position: relative; display: inline-block; }
        .theme-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--card-border); border-radius: 6px; padding: 4px 10px; color: var(--text-dim); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }
        .theme-menu { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px; margin-bottom: 8px; min-width: 140px; z-index: 10; }
        .theme-menu.show { display: block; }
        .theme-option { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text); transition: background 0.2s; }
        .theme-option:hover { background: rgba(255, 255, 255, 0.08); }
        .theme-option.active { background: rgba(var(--accent-rgb), 0.15); color: var(--accent); }
        .theme-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--border-radius); padding: 24px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border: none; border-radius: 50%; background: rgba(255, 255, 255, 0.1); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: rgba(255, 255, 255, 0.2); }
        .modal-chart-container { position: relative; height: 250px; margin-bottom: 20px; }
        .modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; overflow: hidden; }
        .countdown-item { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 16px; min-width: 0; overflow: hidden; }
        .countdown-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .countdown-port { font-size: 14px; font-weight: 600; }
        .countdown-port.c1 { color: var(--port-c1); }
        .countdown-port.c2 { color: var(--port-c2); }
        .countdown-port.c3 { color: var(--port-c3); }
        .countdown-port.a { color: var(--port-a); }
        .countdown-current { font-size: 12px; color: var(--text-dim); }
        .countdown-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .countdown-input { flex: 1; padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; text-align: center; min-width: 60px; max-width: 100px; }
        .countdown-input:focus { outline: none; border-color: var(--accent); }
        .countdown-unit { padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 8px; background: rgba(255, 255, 255, 0.03); color: var(--text-dim); font-size: 12px; display: flex; align-items: center; }
        .countdown-quick { display: flex; gap: 6px; flex-wrap: wrap; }
        .countdown-quick-btn { padding: 6px 10px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; background: rgba(255, 255, 255, 0.08); color: var(--text); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .countdown-quick-btn:hover { background: rgba(var(--accent-rgb), 0.2); border-color: var(--accent); color: var(--accent); }
        .countdown-actions { display: flex; gap: 8px; margin-top: 10px; }
        .countdown-set-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: rgba(var(--accent-rgb), 0.15); color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(var(--accent-rgb), 0.2); }
        .countdown-set-btn:hover { background: rgba(var(--accent-rgb), 0.25); box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.2); }
        .countdown-clear-btn { padding: 8px 12px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; background: rgba(255, 255, 255, 0.06); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .countdown-clear-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(var(--danger-rgb), 0.1); }
        @media (max-width: 600px) {
            .charger-layout { grid-template-columns: 1fr; }
            .charger-image { max-height: 150px; }
            .charger-controls { grid-template-columns: 1fr; }
            .port-grid, .settings-grid, .countdown-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/logo_footer.png" alt="CUKTECH" style="height: 40px; margin-bottom: 12px; filter: brightness(1.2);">
        </div>

        <div class="card">
            <div class="charger-layout">
                <div class="charger-image">
                    <img src="/static/charger.png" alt="CUKTECH Charger" style="max-width:100%;max-height:200px;object-fit:contain;">
                </div>
                <div class="charger-controls">
                    <div class="control-box">
                        <div class="control-label">连接状态</div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <div id="statusBadge" class="status-badge disconnected" title="BLE 设备连接状态">
                                <span class="status-dot"></span>
                                <span>BLE</span>
                            </div>
                            <div id="mqttBadge" class="status-badge disconnected" title="MQTT 连接状态">
                                <span class="status-dot"></span>
                                <span>MQTT</span>
                            </div>
                            <span class="port-count" id="activePorts">0</span>
                            <span class="port-count-label">活跃端口</span>
                        </div>
                    </div>
                    <div class="control-box">
                        <div class="control-label">BLE 控制</div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="bleToggle" onclick="bleToggle()">连接设备</button>
                            <button class="btn btn-secondary" onclick="bleRestart()">重启</button>
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalPower">0.0</div>
                        <div class="stat-label">总功率 (W)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value warning" id="maxVoltage">0.0</div>
                        <div class="stat-label">最高电压 (V)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                功率曲线
                <div style="margin-left: auto; display: flex; gap: 4px;">
                    <button class="time-btn" onclick="setTimeRange(30)">30分</button>
                    <button class="time-btn active" onclick="setTimeRange(60)">60分</button>
                    <button class="time-btn" onclick="setTimeRange(90)">90分</button>
                    <button class="time-btn" onclick="setTimeRange(120)">120分</button>
                    <button class="time-btn" onclick="setTimeRange(1440)">24小时</button>
                </div>
            </div>
            <div class="chart-container"><canvas id="powerChart"></canvas></div>
        </div>

        <div class="card">
            <div class="card-title">端口监控 <span style="font-size:10px;color:var(--text-dim);text-transform:none;letter-spacing:0">(点击查看详情)</span></div>
            <div class="port-grid" id="portGrid"></div>
        </div>

        <div class="card">
            <div class="card-title">设备设置</div>
            <div class="settings-grid" id="settingsGrid"></div>
        </div>

        <div class="card">
            <div class="card-title">倒计时设置</div>
            <div class="countdown-grid" id="countdownGrid"></div>
        </div>

        <div class="footer">
            <a href="https://github.com/kairui1108/cuktech-ble-server" target="_blank" style="color: var(--accent); text-decoration: none;">CUKTECH-BLE-HA Web</a>
            <span style="margin: 0 12px; color: var(--text-dim);">|</span>
            <div class="theme-switcher" id="themeSwitcher">
                <button class="theme-btn" onclick="toggleThemeMenu()" id="themeBtn">🎨 主题</button>
                <div class="theme-menu" id="themeMenu">
                    <div class="theme-option" onclick="setTheme('ha-dark')" data-theme="ha-dark">
                        <span class="theme-dot" style="background: #1c1c1c;"></span> 暗色
                    </div>
                    <div class="theme-option" onclick="setTheme('deep-blue')" data-theme="deep-blue">
                        <span class="theme-dot" style="background: #0f0f1a;"></span> 深蓝
                    </div>
                    <div class="theme-option" onclick="setTheme('ocean')" data-theme="ocean">
                        <span class="theme-dot" style="background: #0a1628;"></span> 海洋
                    </div>
                    <div class="theme-option" onclick="setTheme('gray')" data-theme="gray">
                        <span class="theme-dot" style="background: #2d2d2d;"></span> 灰色
                    </div>
                    <div class="theme-option" onclick="setTheme('light')" data-theme="light">
                        <span class="theme-dot" style="background: #f5f5f5;"></span> 浅色
                    </div>
                    <div class="theme-option" onclick="setTheme('system')" data-theme="system">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #1c1c1c 50%, #f5f5f5 50%);"></span> 跟随系统
                    </div>
                </div>
            </div>
            <span style="margin: 0 12px; color: var(--text-dim);">|</span>
            <div class="theme-switcher" id="logLevelSwitcher">
                <button class="theme-btn" onclick="toggleLogLevelMenu()" id="logLevelBtn">📋 日志</button>
                <div class="theme-menu" id="logLevelMenu">
                    <div class="theme-option" onclick="setLogLevel('debug')" data-level="debug">Debug</div>
                    <div class="theme-option" onclick="setLogLevel('info')" data-level="info">Info</div>
                    <div class="theme-option" onclick="setLogLevel('warning')" data-level="warning">Warning</div>
                    <div class="theme-option" onclick="setLogLevel('error')" data-level="error">Error</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="portModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">C1 端口详情</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-stats">
                <div class="power-item"><div class="power-value" id="modalVoltage">0.0</div><div class="power-label">电压 (V)</div></div>
                <div class="power-item"><div class="power-value success" id="modalCurrent">0.0</div><div class="power-label">电流 (A)</div></div>
                <div class="power-item"><div class="power-value warning" id="modalPower">0.0</div><div class="power-label">功率 (W)</div></div>
                <div class="power-item"><div class="power-value" id="modalProtocol" style="font-size:14px">idle</div><div class="power-label">协议</div></div>
            </div>
            <div class="modal-chart-container"><canvas id="modalChart"></canvas></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
